services:
  - type: web
    name: medinsight-ai-backend
    env: python
    buildCommand: python -m pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --proxy-headers --forwarded-allow-ips='*'
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: 3.10.0
